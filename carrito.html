  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Poppins', 'sans-serif'],
            body: ['Poppins', 'sans-serif'],
          },
          colors: {
            primary: '#111111',
            accent: '#111111',
            darkBg: '#0B0B0B',
            cardBg: '#FFFFFF',
            textPrimary: '#111111',
            textSecondary: '#6B7280',
            warning: '#111111',
            alert: '#E0303D',
            bgPrimary: '#F6F6F4'
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="text-textPrimary font-body bg-bgPrimary" data-page="carrito">
  <div id="app-header"></div>
  <main class="min-h-screen px-4 pt-24 pb-32 max-w-screen-md mx-auto">
    <div id="cart-items" class="flex flex-col gap-4" role="list" aria-label="Productos en tu pedido"></div>
    <div id="checkout-form" class="bg-cardBg p-5 rounded-[2rem] border border-black/5 flex flex-col gap-4 hidden mt-4 shadow-[0_20px_50px_rgba(0,0,0,0.04)]">
      <h3 class="font-display font-bold text-lg text-textPrimary">Datos de Entrega</h3>
      <div>
        <label for="cart-notes" class="block text-xs font-bold text-textSecondary uppercase tracking-wide mb-1.5 flex items-center">Notas Generales</label>
        <textarea id="cart-notes" rows="2" class="checkout-input resize-none" placeholder="Ej: Para llevar, sin pitillo, etc." maxlength="200"></textarea>
      </div>
      <div>
        <label for="cart-address" class="block text-xs font-bold text-warning uppercase tracking-wide mb-1.5 flex items-center">Direccion de Entrega</label>
        <input type="text" id="cart-address" class="checkout-input" placeholder="Tu direccion completa con barrio" autocomplete="street-address" aria-required="true" maxlength="150">
        <p id="address-error" class="text-xs bg-alert text-white px-3 py-2 rounded-lg mt-1 hidden font-bold" role="alert">La direccion de entrega es obligatoria.</p>
      </div>
    </div>
  </main>
  <div class="bg-cardBg px-4 pb-5 pt-4 shrink-0 rounded-t-[2rem] border-t border-black/5 relative max-w-screen-md mx-auto shadow-[0_-10px_30px_rgba(0,0,0,0.04)]">
    <div class="flex justify-between items-baseline mb-1 mt-2">
      <span class="text-textSecondary font-semibold text-sm">Total Productos</span>
      <span id="cart-total-price" class="font-display font-bold text-3xl text-accent tabular-nums">$0</span>
    </div>
    <button id="btn-send-order" type="button" class="whatsapp-btn w-full text-white font-display font-bold text-lg py-4 rounded-3xl flex justify-center items-center gap-2.5" disabled>Enviar por WhatsApp</button>
  </div>
  <div id="app-footer"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
